<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Chart.js (se já tiver em outro lugar, não duplica) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script src="/js/dashboard.js" defer></script>

  <style>
    /* garante que a página não cresça e obrigue scroll */
    html, body { height: 100%; }
  </style>
</head>

<body class="bg-slate-950 text-slate-100 h-screen overflow-hidden">
  <!-- Grid da página inteira -->
  <div class="h-full grid grid-rows-[auto,1fr]">
    <!-- HEADER fixo -->
    <header class="border-b border-slate-900/80 bg-slate-950/60 backdrop-blur">
      <div class="max-w-6xl mx-auto px-3 sm:px-4 py-3 flex items-center justify-between">
        <h1 class="text-lg sm:text-xl font-bold">Dashboard</h1>

        <div class="flex items-center gap-2">
          <a href="/swagger-ui/index.html"
             class="text-xs sm:text-sm text-slate-400 hover:text-slate-200 underline underline-offset-4">
            Swagger
          </a>

          <button id="btnNewCategory"
                  type="button"
                  class="rounded-xl bg-slate-800 hover:bg-slate-700 transition px-3 py-2 text-xs sm:text-sm font-semibold">
            Nova categoria
          </button>

          <button id="logoutBtn"
                  type="button"
                  class="rounded-xl bg-rose-500 hover:bg-rose-400 transition px-3 py-2 text-xs sm:text-sm font-semibold">
            Sair
          </button>
        </div>
      </div>
    </header>

    <!-- MAIN ocupa o resto da tela -->
    <main class="max-w-6xl mx-auto w-full px-3 sm:px-4 py-3 overflow-hidden">
      <!-- grid interno: 4 blocos em linhas, sem estourar -->
      <div class="h-full grid gap-3 grid-rows-[auto,auto,1fr,auto]">

        <!-- Resumo (compacto) -->
        <section class="grid grid-cols-1 sm:grid-cols-3 gap-3">
          <div class="rounded-2xl bg-slate-900/60 border border-slate-800 p-4">
            <div class="text-slate-400 text-xs">Receitas</div>
            <div id="receitas" class="text-xl font-bold text-emerald-400">R$ 0,00</div>
          </div>

          <div class="rounded-2xl bg-slate-900/60 border border-slate-800 p-4">
            <div class="text-slate-400 text-xs">Despesas</div>
            <div id="despesas" class="text-xl font-bold text-rose-400">R$ 0,00</div>
          </div>

          <div class="rounded-2xl bg-slate-900/60 border border-slate-800 p-4">
            <div class="text-slate-400 text-xs">Saldo</div>
            <div id="saldo" class="text-xl font-bold text-indigo-300">R$ 0,00</div>
          </div>
        </section>

        <!-- Nova transação (bem compacto) -->
        <section class="rounded-2xl bg-slate-900/60 border border-slate-800 p-4">
          <div class="flex items-center justify-between gap-4 flex-wrap">
            <h2 class="text-sm sm:text-base font-semibold">Nova transação</h2>
            <div id="msg" class="text-xs text-slate-300"></div>
          </div>

          <div id="err" class="hidden mt-2 text-xs text-rose-400"></div>

          <!-- Tabs -->
          <div class="mt-3 flex gap-2">
            <button type="button" id="tabReceita"
              class="px-3 py-2 rounded-xl border border-slate-800 bg-slate-950 hover:bg-slate-900 text-xs font-semibold">
              Receita
            </button>
            <button type="button" id="tabDespesa"
              class="px-3 py-2 rounded-xl border border-slate-800 bg-slate-950 hover:bg-slate-900 text-xs font-semibold">
              Despesa
            </button>
            <input id="tipo" type="hidden" value="RECEITA" />
          </div>

          <form id="txForm" class="mt-3 grid grid-cols-1 sm:grid-cols-12 gap-2">
            <input id="descricao"
              class="sm:col-span-4 w-full rounded-xl bg-slate-950 border border-slate-800 px-3 py-2 text-sm"
              placeholder="Descrição" />

            <input id="valor"
              class="sm:col-span-2 w-full rounded-xl bg-slate-950 border border-slate-800 px-3 py-2 text-sm"
              placeholder="Valor (ex: 19.90)" inputmode="decimal" />

            <input id="data"
              class="sm:col-span-2 w-full rounded-xl bg-slate-950 border border-slate-800 px-3 py-2 text-sm"
              type="date" />

            <select id="categoria"
              class="sm:col-span-4 w-full rounded-xl bg-slate-950 border border-slate-800 px-3 py-2 text-sm">
              <option value="">Carregando categorias...</option>
            </select>

            <button id="btnCriar"
              type="submit"
              class="sm:col-span-12 rounded-xl bg-indigo-500 hover:bg-indigo-400 transition px-3 py-2 text-sm font-semibold">
              Adicionar
            </button>
          </form>
        </section>

        <!-- Lista: ocupa a parte "1fr" e rola só dentro -->
        <section class="rounded-2xl bg-slate-900/60 border border-slate-800 p-4 overflow-hidden flex flex-col">
          <div class="flex items-center justify-between flex-wrap gap-2">
            <h2 class="text-sm sm:text-base font-semibold">Minhas transações</h2>

            <div class="flex items-center gap-2 flex-wrap">
              <input id="inicio" class="rounded-xl bg-slate-950 border border-slate-800 px-3 py-2 text-xs" type="date" />
              <input id="fim" class="rounded-xl bg-slate-950 border border-slate-800 px-3 py-2 text-xs" type="date" />

              <button id="btnFiltrar" type="button"
                class="rounded-xl bg-slate-800 hover:bg-slate-700 transition px-3 py-2 text-xs font-semibold">
                Filtrar
              </button>

              <button id="btnLimpar" type="button"
                class="rounded-xl bg-slate-950 border border-slate-800 hover:bg-slate-900 transition px-3 py-2 text-xs font-semibold">
                Limpar
              </button>
            </div>
          </div>

          <!-- tabela com scroll interno -->
          <div class="mt-3 overflow-auto flex-1">
            <table class="w-full text-xs sm:text-sm">
              <thead class="text-slate-300 sticky top-0 bg-slate-950/80 backdrop-blur">
                <tr class="border-b border-slate-800">
                  <th class="text-left py-2 pr-2">Data</th>
                  <th class="text-left py-2 pr-2">Descrição</th>
                  <th class="text-left py-2 pr-2">Tipo</th>
                  <th class="text-left py-2 pr-2">Categoria</th>
                  <th class="text-right py-2 pr-2">Valor</th>
                  <th class="text-right py-2">Ações</th>
                </tr>
              </thead>
              <tbody id="tbody" class="text-slate-100"></tbody>
            </table>
          </div>

          <div class="mt-3 flex items-center justify-between gap-3 flex-wrap">
            <div id="pageInfo" class="text-xs text-slate-400"></div>

            <div class="flex items-center gap-2">
              <button id="prevBtn" type="button"
                class="rounded-xl bg-slate-950 border border-slate-800 hover:bg-slate-900 transition px-3 py-2 text-xs font-semibold">
                Anterior
              </button>

              <div id="pageBtns" class="flex items-center gap-1"></div>

              <button id="nextBtn" type="button"
                class="rounded-xl bg-slate-950 border border-slate-800 hover:bg-slate-900 transition px-3 py-2 text-xs font-semibold">
                Próxima
              </button>
            </div>
          </div>
        </section>

        <!-- Gráficos (compactos) -->
        <section class="grid grid-cols-1 lg:grid-cols-3 gap-3">
          <div class="lg:col-span-2 rounded-2xl bg-slate-900/60 border border-slate-800 p-4 overflow-hidden">
            <div class="flex items-center justify-between">
              <h3 class="text-sm font-semibold">Evolução (últimos 30 dias)</h3>
              <span class="text-xs text-slate-400">Receitas x Despesas x Saldo</span>
            </div>
            <div class="mt-2 h-[180px] sm:h-[200px]">
              <canvas id="chartLinha" class="w-full h-full"></canvas>
            </div>
          </div>

          <div class="rounded-2xl bg-slate-900/60 border border-slate-800 p-4 overflow-hidden">
            <div class="flex items-center justify-between">
              <h3 class="text-sm font-semibold">Por categoria</h3>
              <span class="text-xs text-slate-400">período atual</span>
            </div>
            <div class="mt-2 h-[180px] sm:h-[200px]">
              <canvas id="chartCategoria" class="w-full h-full"></canvas>
            </div>
          </div>
        </section>

      </div>
    </main>
  </div>

  <!-- Modal Nova Categoria -->
  <div id="catModal" class="hidden fixed inset-0 bg-black/60">
    <div class="min-h-screen flex items-center justify-center p-4">
      <div class="w-full max-w-md rounded-2xl bg-slate-900 border border-slate-800 p-5 space-y-4">
        <div class="flex items-center justify-between">
          <h3 class="text-lg font-semibold">Nova categoria</h3>
          <button id="catClose" type="button" class="text-slate-300 hover:text-white">✕</button>
        </div>

        <div id="catErr" class="hidden text-sm text-rose-400"></div>

        <input id="catNome" class="w-full rounded-xl bg-slate-950 border border-slate-800 p-3" placeholder="Nome da categoria" />

        <select id="catTipo" class="w-full rounded-xl bg-slate-950 border border-slate-800 p-3">
          <option value="RECEITA">RECEITA</option>
          <option value="DESPESA">DESPESA</option>
        </select>

        <button id="catSave" type="button"
          class="w-full rounded-xl bg-indigo-500 hover:bg-indigo-400 transition p-3 font-semibold">
          Criar
        </button>
      </div>
    </div>
  </div>

  <!-- Modal Editar Transação -->
  <div id="editModal" class="hidden fixed inset-0 bg-black/60">
    <div class="min-h-screen flex items-center justify-center p-4">
      <div class="w-full max-w-lg rounded-2xl bg-slate-900 border border-slate-800 p-5 space-y-4">
        <div class="flex items-center justify-between">
          <h3 class="text-lg font-semibold">Editar transação</h3>
          <button id="editClose" type="button" class="text-slate-300 hover:text-white">✕</button>
        </div>

        <div id="editErr" class="hidden text-sm text-rose-400"></div>

        <input id="editDescricao" class="w-full rounded-xl bg-slate-950 border border-slate-800 p-3" placeholder="Descrição" />

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
          <input id="editValor" class="w-full rounded-xl bg-slate-950 border border-slate-800 p-3" placeholder="Valor (ex: 19.90)" />
          <input id="editData" class="w-full rounded-xl bg-slate-950 border border-slate-800 p-3" type="date" />
          <select id="editTipo" class="w-full rounded-xl bg-slate-950 border border-slate-800 p-3">
            <option value="RECEITA">RECEITA</option>
            <option value="DESPESA">DESPESA</option>
          </select>
        </div>

        <select id="editCategoria" class="w-full rounded-xl bg-slate-950 border border-slate-800 p-3">
          <option value="">Selecione...</option>
        </select>

        <button id="editSave" type="button"
          class="w-full rounded-xl bg-indigo-500 hover:bg-indigo-400 transition p-3 font-semibold">
          Salvar alterações
        </button>
      </div>
    </div>
  </div>
</body>
</html>
